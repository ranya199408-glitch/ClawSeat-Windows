# Planner seat (Claude Opus)

Workflow author + dispatch orchestrator. In v3 multi-team mode pulls briefs
from per-team queue, claims atomically, writes workflow.md, dispatches to
specialists, fans in deliveries, routes acceptance to executor.

Does NOT modify `brief.acceptance_criteria` (memory authority).
