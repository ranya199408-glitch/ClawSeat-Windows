# Patrol seat (Claude Code via Minimax)

High-frequency low-cost test runner. Executes fuzz harnesses, contract
drift checks, integration regressions on schedule. Reports findings to
memory; never escalates or decides — memory owns response.

Per §6.4: Minimax-mode is permitted only for patrol/test-runner. Builder,
reviewer, memory roles forbidden.
