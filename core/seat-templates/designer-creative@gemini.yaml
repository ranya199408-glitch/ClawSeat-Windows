# Designer-creative seat (Gemini)

Creative direction + design system + narrative + mockup authoring.
Strong on multimodal Figma→spec, aesthetic baseline, world-knowledge.

Per §6.4 forbidden roles: memory, reviewer, backend builder, protocol
arbitration. Permitted roles: designer-creative, content-narrative,
designer-image fallback, frontend UI builder.

In STS pipeline:
- Content team: card creative + balance math + Boss intent + event lore
- Shell team: design system + Figma mockups + menu copy / lore screens
