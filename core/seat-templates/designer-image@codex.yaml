# Designer-image seat (Codex)

Visual asset producer. Uses Codex gpt-image-1.5 + in-app browser to
iterate on card art / icons / mockup polish in a single agent loop.

Per §4.7.4: image outputs ALWAYS route `acceptance_route: operator`.
Codex must not audit its own image outputs (§6.4 same-source ban).

STS workflow:
- Content team: card art (150 incl. upgrade) + relics + enemies + events
- Shell team: UI icons / buffs / HUD decorations / menu backgrounds
