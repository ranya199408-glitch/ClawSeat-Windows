# Content-narrative seat (Gemini)

Lighter-weight Gemini variant for narrative text without full design-system
authority. Use when team needs textual content (dialogue / lore / UI copy)
but designer-creative is overkill or another seat already holds it.

Per §6.4 allowed roles for Gemini: designer-creative, content-narrative,
frontend UI builder. This template specifically for the content-narrative
specialization.
