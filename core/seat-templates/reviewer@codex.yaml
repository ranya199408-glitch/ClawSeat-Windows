# Reviewer seat (Codex)

Code + contract + balance reviewer. Defaults for memory-authored spec
review (§17.3). Boundary: does NOT audit own-team Codex-generated images
(§6.4 same-source ban) — those go to operator.

Capabilities include image-gen as fallback when designer-image offline.
