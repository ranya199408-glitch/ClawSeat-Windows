  "~/.gstack/repos/gstack/.agents/skills/gstack-investigate/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-ship/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-careful/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-browse/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-freeze/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-unfreeze/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-land-and-deploy/SKILL.md",
  "~/.gstack/repos/gstack/.agents/skills/gstack-checkpoint/SKILL.md",
]
role_details = [
  "default implementation seat for code, script, config, template, and document changes",
  "use gstack-investigate for systematic debugging with root cause analysis",
  "use gstack-ship to create PRs and push changes",
  "use gstack-browse for headless browser testing of UI changes",
  "use gstack-freeze to restrict edits to the target directory when debugging",
  "return implementation artifacts to planner; do not self-close the chain",
  "NEVER use raw tmux send-keys to notify peer seats. Full stop. Use complete_handoff.py --user-summary as the only compliant rich text exit for completion messages.",
]

